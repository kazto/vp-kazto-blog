packages:
  - apps/*
  - packages/*
  - tools/*
allowBuilds:
  esbuild: true
  sharp: false
  workerd: false

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: 0.1.11
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  wrangler: ^4.75.0

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
