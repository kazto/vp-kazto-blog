name: Publish Issue as Blog Post

on:
  issues:
    types: [labeled]

jobs:
  publish:
    if: github.event.label.name == 'published'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate filename and save post
        id: save
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
        run: |
          # 日付をYYYY-MM-DD形式で取得
          DATE=$(echo "$ISSUE_CREATED_AT" | cut -c1-10)

          # タイトルをスラッグ化（小文字、英数字とハイフンのみ）
          SLUG=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9あ-んア-ンー一-龯]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//;s/-$//')

          FILENAME="posts/${DATE}-${SLUG}.md"
          echo "filename=${FILENAME}" >> "$GITHUB_OUTPUT"

          # ファイルに書き込み
          printf '%s' "$ISSUE_BODY" > "$FILENAME"
          echo "Saved to $FILENAME"

      - name: Download GitHub images and rehost to Cloudflare R2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash .github/scripts/download-and-rehost-images.sh "${{ steps.save.outputs.filename }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.save.outputs.filename }}"
          git commit -m "feat: publish post from issue #${{ github.event.issue.number }}"
          git push
