name: Publish Issue as Blog Post

on:
  issues:
    types: [labeled]

jobs:
  publish:
    if: github.event.label.name == 'published'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate filename and save post
        id: save
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_CREATED_AT: ${{ github.event.issue.created_at }}
        run: |
          # 日付をYYYY-MM-DD形式で取得
          DATE=$(echo "$ISSUE_CREATED_AT" | cut -c1-10)

          # タイトルをスラッグ化（小文字、英数字とハイフンのみ）
          SLUG=$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9あ-んア-ンー一-龯]/-/g' \
            | sed 's/-\+/-/g' \
            | sed 's/^-//;s/-$//')

          FILENAME="posts/${DATE}-${SLUG}.md"
          echo "filename=${FILENAME}" >> "$GITHUB_OUTPUT"

          # ファイルに書き込み
          printf '%s' "$ISSUE_BODY" > "$FILENAME"
          echo "Saved to $FILENAME"

      - name: Download GitHub images and rehost to Cloudflare R2
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          FILENAME="${{ steps.save.outputs.filename }}"

          # GitHub画像URLを2パターンで抽出（マッチなしでも終了しないよう || true）
          # 1) private-user-images（JWT付き一時URL）
          # 2) user-attachments/assets（安定URL、webhookペイロードはこちらの場合が多い）
          {
            grep -oP 'https://private-user-images\.githubusercontent\.com/[^\)]+' "$FILENAME" || true
            grep -oP 'https://github\.com/user-attachments/assets/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' "$FILENAME" || true
          } | sort -u | while IFS= read -r URL; do
            UUID=$(echo "$URL" | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
            EXT=$(echo "$URL" | grep -oP '\.[a-z]+(?=\?)' | head -1 | tr -d '.')
            [ -z "$UUID" ] && { echo "No UUID found in: $URL"; continue; }
            [ -z "$EXT" ] && EXT="jpg"

            # 安定URLでダウンロード（JWTは期限切れの可能性があるため）
            STABLE_URL="https://github.com/user-attachments/assets/${UUID}"
            TMPFILE="/tmp/${UUID}.${EXT}"

            HTTP_CODE=$(curl -s -L -w "%{http_code}" -o "$TMPFILE" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "$STABLE_URL")

            if [ "$HTTP_CODE" != "200" ]; then
              echo "Failed to download $STABLE_URL (HTTP $HTTP_CODE)"
              rm -f "$TMPFILE"
              continue
            fi

            # upload-image.sh でCloudflare R2にアップロード
            R2_OUTPUT=$(bash upload-image.sh "$TMPFILE" 2>&1)
            echo "$R2_OUTPUT"
            R2_URL=$(echo "$R2_OUTPUT" | grep '^URL: ' | sed 's/^URL: //')

            if [ -n "$R2_URL" ]; then
              # URLを置換（特殊文字対策のためPythonスクリプトを使用）
              OLD_URL="$URL" NEW_URL="$R2_URL" python3 .github/scripts/replace-image-urls.py "$FILENAME"
            else
              echo "Upload failed for $TMPFILE"
            fi

            rm -f "$TMPFILE"
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.save.outputs.filename }}"
          git commit -m "feat: publish post from issue #${{ github.event.issue.number }}"
          git push
